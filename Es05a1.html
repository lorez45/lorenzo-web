<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Form Persona</title>
</head>
<body>

  <!-- Form per inserire i dati -->
  <form id="formPersona">
    <label>Nome:</label>
    <input type="text" id="nome" required><br><br>

    <label>Cognome:</label>
    <input type="text" id="cognome" required><br><br>

    <label>Età:</label>
    <input type="number" id="eta" required><br><br>

    <button type="submit">Invia</button>
  </form>

  <script>
    // Prendo il form tramite ID
    const form = document.getElementById("formPersona");

    // Aggiungo un evento quando il form viene inviato
    form.addEventListener("submit", function(event) {

      // Evito il refresh della pagina
      event.preventDefault();

      // Recupero i valori inseriti dall'utente
      const nome = document.getElementById("nome").value;
      const cognome = document.getElementById("cognome").value;
      const eta = document.getElementById("eta").value;

      // Creo l'oggetto persona
      const persona = {
        nome: nome,
        cognome: cognome,
        eta: eta
      };

      // Stampo l'oggetto nella console
      console.log(persona);
    });
  </script>

</body>
</html>
