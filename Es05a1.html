<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Form Persona</title>

  <style>
    /* Stile generale della pagina */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    /* Contenitore con effetto glass */
    .container {
      background: rgba(40, 40, 70, 0.8);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      width: 320px;
      text-align: center;
      color: #fff;
      animation: fadeIn 1s ease; /* animazione entrata */
    }

    /* Animazione comparsa */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      margin-bottom: 20px;
    }

    /* Input */
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 5px;
      border-radius: 10px;
      border: none;
      outline: none;
      transition: 0.3s;
    }

    /* Effetto focus sugli input */
    input:focus {
      box-shadow: 0 0 8px #8ab4f8;
      transform: scale(1.03); /* piccolo zoom */
    }

    /* Messaggi errore */
    .error {
      color: #ff6b6b;
      font-size: 13px;
      margin-bottom: 10px;
      display: block;
    }

    /* Bottone */
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #8ab4f8;
      color: #1e1e2f;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    /* Effetto hover bottone */
    button:hover {
      background: #6ea8fe;
      transform: scale(1.05);
    }

    /* Messaggio finale */
    #output {
      margin-top: 15px;
      font-weight: bold;
      color: #fff;
      animation: fadeIn 0.5s ease;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Inserisci i tuoi dati</h2>

    <form id="formPersona">
      <label>Nome:</label>
      <input type="text" id="nome" required>
      <span id="erroreNome" class="error"></span>

      <label>Cognome:</label>
      <input type="text" id="cognome" required>
      <span id="erroreCognome" class="error"></span>

      <label>Età:</label>
      <input type="number" id="eta" required>
      <span id="erroreEta" class="error"></span>

      <button type="submit">Invia</button>
    </form>

    <div id="output"></div>
  </div>

  <script>
    const form = document.getElementById("formPersona");

    form.addEventListener("submit", function(event) {

      event.preventDefault(); // blocca refresh pagina

      const nome = document.getElementById("nome").value;
      const cognome = document.getElementById("cognome").value;
      const eta = parseInt(document.getElementById("eta").value);

      const erroreNome = document.getElementById("erroreNome");
      const erroreCognome = document.getElementById("erroreCognome");
      const erroreEta = document.getElementById("erroreEta");

      // reset errori
      erroreNome.textContent = "";
      erroreCognome.textContent = "";
      erroreEta.textContent = "";

      let valido = true;

      // controllo nome
      if (/\d/.test(nome)) {
        erroreNome.textContent = "Il nome non può contenere numeri";
        valido = false;
      }

      // controllo cognome
      if (/\d/.test(cognome)) {
        erroreCognome.textContent = "Il cognome non può contenere numeri";
        valido = false;
      }

      // controllo età
      if (eta <= 0) {
        erroreEta.textContent = "L'età deve essere maggiore di 0";
        valido = false;
      } else if (eta > 100) {
        erroreEta.textContent = "L'età massima è 100";
        valido = false;
      }

      if (!valido) return;

      // Creo l'oggetto persona
      const persona = {
        nome: nome,
        cognome: cognome,
        eta: eta
      };

      // Stampo l'oggetto nella console
      console.log(persona);

      // Mostro un messaggio nella pagina (nuova funzione)
      // Serve per dare un feedback visivo all'utente
      document.getElementById("output").textContent =
        "Ciao " + nome + " " + cognome + ", età: " + eta;

      // Reset del form dopo l'invio (nuova funzione)
      // Pulisce automaticamente i campi
      form.reset();
    });
  </script>

</body>
</html>
