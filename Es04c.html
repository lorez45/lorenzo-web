<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Calcolatrice</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* contenitore principale */
.calculator {
    background: #222;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    width: 320px;
}

/* display */
.display {
    background: #111;
    color: #00ffcc;
    font-size: 26px;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    text-align: right;
    min-height: 40px;
}

/* input */
input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
}

/* bottoni */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #444;
    color: white;
    transition: all 0.2s ease;
}

button:hover {
    background: #666;
    transform: scale(1.05);
}

/* bottone uguale */
.equals {
    background: #00c896;
    color: black;
    grid-column: span 2;
}

.equals:hover {
    background: #00e6aa;
}

/* operazioni */
.operator {
    background: #ff9500;
}

.operator:hover {
    background: #ffaa33;
}
</style>
</head>

<body>

<div class="calculator">
    <div id="result" class="display">Risultato: 0</div>

    <input type="number" id="num1" placeholder="Primo numero">
    <input type="number" id="num2" placeholder="Secondo numero">

    <div class="buttons">
        <button class="operator" onclick="calculate('+')">+</button>
        <button class="operator" onclick="calculate('-')">-</button>
        <button class="operator" onclick="calculate('*')">*</button>
        <button class="operator" onclick="calculate('/')">/</button>

        <button class="operator" onclick="calculate('**')">^</button>
        <button onclick="clearFields()">C</button>
        <button class="equals" onclick="calculate('+')">=</button>
    </div>
</div>

<script>
function calculate(operation) {

    let num1 = parseFloat(document.getElementById("num1").value);
    let num2 = parseFloat(document.getElementById("num2").value);
    let resultDiv = document.getElementById("result");

    if (isNaN(num1) || isNaN(num2)) {
        resultDiv.textContent = "Errore: Inserisci due numeri validi."; // mostra un messaggio di errore
        return; // interrompe l'esecuzione della funzione
    }

    let result; // variabile che conterra' il risultato del calcolo

    try { // blocco che prova ad eseguire il codice e gestisce eventuali errori

        if (operation === "+") { // controlla se l'operazione richiesta e' una somma
            result = num1 + num2; // esegue la somma
        }
        else if (operation === "-") { // controlla se l'operazione richiesta e' una sottrazione
            result = num1 - num2; // esegue la sottrazione
        }
        else if (operation === "*") { // controlla se l'operazione richiesta e' una moltiplicazione
            result = num1 * num2; // esegue la moltiplicazione
        }
        else if (operation === "/") { // controlla se l'operazione richiesta e' una divisione

            if(num2 === 0){ // verifica se il secondo numero e' zero
                throw new Error("Divisione per zero non possibile"); // genera un errore se si tenta di dividere per zero
            }

            result = num1 / num2; // esegue la divisione
        }
        else if (operation === "**") { // controlla se l'operazione richiesta e' una potenza
            result = num1 ** num2; // calcola la potenza (num1 elevato a num2)
        }
        else { // se l'operazione inserita non e' tra quelle previste
            throw new Error("Operazione non valida"); // genera un errore
        }

        resultDiv.textContent = "Risultato: " + result; // mostra il risultato nella pagina

    } catch (error) { // cattura eventuali errori generati nel blocco try

        resultDiv.textContent = "Errore: " + error.message; // mostra il messaggio di errore nella pagina

    }

}

function clearFields(){
    document.getElementById("num1").value = "";
    document.getElementById("num2").value = "";
    document.getElementById("result").textContent = "Risultato: 0";
}
</script>

</body>
</html>
