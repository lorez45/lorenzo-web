<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Form Persona</title>

  <style>
    /* Stile generale della pagina */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    /* Contenitore migliorato (più scuro e coerente col background) */
    .container {
      background: rgba(40, 40, 70, 0.8); /* colore più coerente */
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      width: 320px;
      text-align: center;
      color: #fff;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      margin-bottom: 20px;
    }

    /* Input */
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 5px;
      border-radius: 10px;
      border: none;
      outline: none;
      transition: 0.3s;
    }

    /* Effetto focus */
    input:focus {
      box-shadow: 0 0 8px #8ab4f8;
      transform: scale(1.03);
    }

    /* Messaggi di errore */
    .error {
      color: #ff6b6b;
      font-size: 13px;
      margin-bottom: 10px;
      display: block;
    }

    /* Bottone */
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #8ab4f8;
      color: #1e1e2f;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover {
      background: #6ea8fe;
      transform: scale(1.05);
    }

    /* Messaggio finale */
    #output {
      margin-top: 15px;
      font-weight: bold;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Inserisci i tuoi dati</h2>

    <form id="formPersona">
      <label>Nome:</label>
      <input type="text" id="nome" required>
      <span id="erroreNome" class="error"></span> <!-- errore nome -->

      <label>Cognome:</label>
      <input type="text" id="cognome" required>
      <span id="erroreCognome" class="error"></span> <!-- errore cognome -->

      <label>Età:</label>
      <input type="number" id="eta" required><br><br>

      <button type="submit">Invia</button>
    </form>

    <div id="output"></div>
  </div>

  <script>
    // Prendo il form tramite ID
    const form = document.getElementById("formPersona");

    form.addEventListener("submit", function(event) {

      event.preventDefault(); // blocca il refresh

      // Recupero valori
      const nome = document.getElementById("nome").value;
      const cognome = document.getElementById("cognome").value;
      const eta = document.getElementById("eta").value;

      // Recupero campi errore
      const erroreNome = document.getElementById("erroreNome");
      const erroreCognome = document.getElementById("erroreCognome");

      // Reset errori precedenti
      erroreNome.textContent = "";
      erroreCognome.textContent = "";

      let valido = true; // variabile per controllo generale

      // Controllo se ci sono numeri nel nome
      if (/\d/.test(nome)) { // \d controlla se c'è almeno un numero
        erroreNome.textContent = "Il nome non può contenere numeri";
        valido = false;
      }

      // Controllo se ci sono numeri nel cognome
      if (/\d/.test(cognome)) {
        erroreCognome.textContent = "Il cognome non può contenere numeri";
        valido = false;
      }

      // Se non valido interrompe tutto
      if (!valido) return;

      // Creo l'oggetto persona
      const persona = {
        nome: nome,
        cognome: cognome,
        eta: eta
      };

      console.log(persona); // stampa oggetto

      // Messaggio utente
      document.getElementById("output").textContent =
        "Ciao " + nome + " " + cognome + ", età: " + eta;

      form.reset(); // reset form
    });
  </script>

</body>
</html>
